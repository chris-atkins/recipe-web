<app-navbar></app-navbar>

<div class="container view-recipe-page" [hidden]="inEditMode">
  <div class="recipe-view-card">
    <button class="copy-link copy-button" title="Copy Import URL to Clipboard" (click)="copyAlternateUrlClicked()" role="button"><i class="fa fa-link" aria-hidden="true"></i><span>Copied</span></button>

    <span class="cat-pill" *ngIf="recipe.category" [style.background-color]="getCategoryColor()"><span class="cat-emoji">{{ getCategoryEmoji() }}</span>{{ recipe.category }}</span>

    <h2 class="recipe-title"><span id="recipe-name">{{ recipe.recipeName }}</span></h2>

    <div class="recipe-rating-holder">
      <app-rating-stars [rating]="recipe.rating" [recipeId]="recipe.recipeId" [interactive]="true"></app-rating-stars>
    </div>

    <app-recipe-tags [recipe]="recipe"></app-recipe-tags>

    <img class="recipe-photo" *ngIf="imageExists()" [src]="recipe.image?.imageUrl" [alt]="'Photo of ' + recipe.recipeName"/>

    <div class="card-divider"></div>

    <p><span id="recipe-content" class="recipe-ingredients show-line-breaks" [innerHTML]="recipeContentHtml"></span></p>
  </div>
</div>

<div class="container edit-recipe-page" *ngIf="inEditMode">
  <div class="page-header-row">
    <div class="edit-recipe-title-holder"><h2><span id="edit-recipe-page-title">Edit Recipe</span></h2></div>
    <div class="image-upload-holder">
      <app-image-upload-modal (imageSaved)="imageSaved($event)"></app-image-upload-modal>
    </div>
  </div>

  <div class="serves-as-newline" *ngIf="imageExists()"></div>
  <img class="recipe-image" *ngIf="imageExists()" [src]="recipe.image?.imageUrl"/>

  <div class="form-group">
    <label class="field-label" for="recipe-name-input">Recipe Name</label>
    <input id="recipe-name-input" class="form-control" placeholder="Recipe Name" type="text" [(ngModel)]="nameBeingEdited"/>
  </div>

  <div class="form-group" #categorySection>
    <label class="field-label">Category <span class="required-badge">required</span></label>
    <app-category-picker [category]="categoryBeingEdited" (categoryChange)="onCategoryChange($event)" [(invalid)]="categoryInvalid"></app-category-picker>
  </div>

  <div class="form-group">
    <label class="field-label">Tags <span class="optional-badge">optional</span></label>
    <app-tag-input [(tags)]="tagsBeingEdited" [suggestions]="tagSuggestions" [suggestionCategory]="categoryBeingEdited"></app-tag-input>
  </div>

  <div class="form-group recipe-content-editor-group">
    <label class="field-label">Recipe</label>
    <quill-editor
      class="recipe-content-editor"
      [(ngModel)]="contentBeingEdited"
      placeholder="Recipe content...">
    </quill-editor>
  </div>
</div>

<div class="recipe-action-bar hidden-print">
  <a id="edit-recipe-button" class="btn-navy-outline" (click)="editClicked()" role="button" *ngIf="shouldShowEditButtons()" [hidden]="inEditMode">Edit Recipe</a>
  <a id="cancel-edit-button" class="btn-navy-outline" (click)="cancelEdit()" role="button" *ngIf="shouldShowEditButtons()" [hidden]="!inEditMode">Cancel</a>
  <a id="update-recipe-button" class="btn-navy" (click)="saveClicked()" role="button" *ngIf="shouldShowEditButtons()" [hidden]="!inEditMode">Save Recipe</a>
  <div class="pull-right">
    <span id="in-recipe-book-marker" class="badge badge-secondary" [hidden]="!inRecipeBook()"><i class="fa fa-check" aria-hidden="true"></i> In Recipe Book</span>
    <a class="remove-recipe-from-book-button btn-navy-outline btn-sm" [hidden]="!canRemoveFromRecipeBook()" (click)="removeRecipeFromBook()" role="button">Remove</a>
  </div>
  <a class="add-to-recipe-book-button btn-navy pull-right floating-bottom-button" [hidden]="!canAddToRecipeBook()" (click)="addToRecipeBook()" role="button">Add to Recipe Book</a>
</div>
